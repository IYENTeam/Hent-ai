name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openclaw:
    name: OpenClaw Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install shared dependencies
        working-directory: shared
        run: npm install --no-audit --no-fund

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit --skipLibCheck

      - name: Test
        run: pnpm test

  generate:
    name: Generate Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if generate module exists
        id: check
        run: |
          if [ -f generate/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install shared dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: shared
        run: npm install --no-audit --no-fund

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: generate
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: generate
        run: npm run build

      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: generate
        run: npm test

      - name: Verify package entrypoints
        if: steps.check.outputs.exists == 'true'
        working-directory: generate
        run: |
          test -f dist/generate/src/main.js || { echo "::error::declared bin dist/generate/src/main.js missing after build"; exit 1; }
          test -f dist/generate/src/index.js || { echo "::error::declared export dist/generate/src/index.js missing after build"; exit 1; }
          npm pack --dry-run --json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const files = data[0].files.map((f) => f.path);
            for (const required of ['dist/generate/src/main.js', 'dist/generate/src/index.js']) {
              if (!files.includes(required)) {
                console.error(`${required} not included in package tarball`);
                process.exit(1);
              }
            }
            console.log('Generate entrypoints present in tarball:', 'dist/generate/src/main.js, dist/generate/src/index.js');
          "

      - name: Skip (module not present)
        if: steps.check.outputs.exists != 'true'
        run: echo "generate/ not present on this branch, skipping"

  cursor:
    name: Cursor Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if cursor module exists
        id: check
        run: |
          if [ -f cursor/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install shared dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: shared
        run: npm install --no-audit --no-fund

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: cursor
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: cursor
        run: npm run build

      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: cursor
        run: npm test

      - name: Verify CLI bin is built and packaged
        if: steps.check.outputs.exists == 'true'
        working-directory: cursor
        run: |
          test -f dist-cli/install.js || { echo "::error::declared bin dist-cli/install.js missing after build"; exit 1; }
          npm pack --dry-run --json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const files = data[0].files.map((f) => f.path);
            if (!files.includes('dist-cli/install.js')) {
              console.error('dist-cli/install.js not included in package tarball');
              process.exit(1);
            }
            console.log('Cursor CLI bin present in tarball:', 'dist-cli/install.js');
          "

      - name: Skip (module not present)
        if: steps.check.outputs.exists != 'true'
        run: echo "cursor/ not present on this branch, skipping"

  hermes:
    name: Hermes Plugin (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if hermes module exists
        id: check
        run: |
          if [ -f hermes/__init__.py ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        if: steps.check.outputs.exists == 'true'
        run: pip install pytest

      - name: Run hermes tests
        if: steps.check.outputs.exists == 'true'
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest tests/hermes/ -v

      - name: Skip (module not present)
        if: steps.check.outputs.exists != 'true'
        run: echo "hermes/ not present, skipping"

  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [openclaw, generate, cursor, hermes]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify plugin manifest
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('openclaw/openclaw.plugin.json', 'utf8'));
            const required = ['id', 'name', 'description', 'activation', 'configSchema'];
            const missing = required.filter(k => !manifest[k]);
            if (missing.length) {
              console.error('Missing required manifest fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('✅ Plugin manifest valid:', manifest.id, '—', manifest.name);

            // Validate configSchema is valid JSON Schema
            const schema = manifest.configSchema;
            if (schema.type !== 'object') {
              console.error('configSchema.type must be object');
              process.exit(1);
            }
            console.log('✅ Config schema properties:', Object.keys(schema.properties || {}).length);
          "

      - name: Verify assets integrity
        run: |
          ASSET_DIR="assets"
          if [ -d "$ASSET_DIR" ]; then
            COUNT=$(find "$ASSET_DIR" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.webp" \) | wc -l)
            echo "✅ Found $COUNT image assets"
            if [ "$COUNT" -eq 0 ]; then
              echo "::warning::No image assets found in assets/"
            fi
          else
            echo "::error::assets/ directory missing"
            exit 1
          fi

      - name: Verify entry point exports
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('openclaw/index.ts', 'utf8');
            if (!content.includes('definePluginEntry')) {
              console.error('index.ts must use definePluginEntry');
              process.exit(1);
            }
            console.log('✅ Entry point uses definePluginEntry');
          "
