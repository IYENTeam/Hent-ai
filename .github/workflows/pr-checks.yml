name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label by changed files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

  size:
    name: PR Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff --numstat origin/main...HEAD | awk '{sum+=$1} END {print sum+0}')
          DELETIONS=$(git diff --numstat origin/main...HEAD | awk '{sum+=$2} END {print sum+0}')
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "📊 PR Size: +$ADDITIONS / -$DELETIONS (total: $TOTAL lines)"

          if [ "$TOTAL" -gt 1000 ]; then
            echo "::warning::Large PR ($TOTAL lines). Consider splitting into smaller PRs."
          elif [ "$TOTAL" -gt 500 ]; then
            echo "::notice::Medium PR ($TOTAL lines)."
          else
            echo "✅ Small PR ($TOTAL lines)."
          fi

  changeset:
    name: Changeset Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for breaking changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_REVIEWERS: changeroa
          OWNER_REVIEW_LABEL: owner-reviewed
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only origin/main...HEAD)
          OWNER_GATE_REQUIRED=0
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          require_owner_review() {
            local reason="$1"
            local pr_number="${{ github.event.pull_request.number }}"
            local repo="${{ github.repository }}"

            if jq -e --arg label "$OWNER_REVIEW_LABEL" '.pull_request.labels[]?.name == $label' "$GITHUB_EVENT_PATH" >/dev/null; then
              echo "✅ Owner review gate satisfied by label: $OWNER_REVIEW_LABEL ($reason)"
              return 0
            fi

            local approved_owner
            approved_owner=$(gh api "repos/$repo/pulls/$pr_number/reviews" --paginate --slurp \
              | jq -r --arg owners "$OWNER_REVIEWERS" --arg head_sha "$HEAD_SHA" '
                  ($owners | split(",") | map(ascii_downcase)) as $allowed
                  | flatten
                  | map(select((.user.login | ascii_downcase) as $login | $allowed | index($login)))
                  | map(select(.commit_id == $head_sha))
                  | sort_by(.submitted_at // "")
                  | group_by(.user.login | ascii_downcase)
                  | map(max_by(.submitted_at // ""))
                  | map(select(.state == "APPROVED"))
                  | first.user.login // empty
                ')

            if [ -n "$approved_owner" ]; then
              echo "✅ Owner review gate satisfied by approval from: $approved_owner ($reason)"
              return 0
            fi

            echo "::error::$reason Request owner review by one of [$OWNER_REVIEWERS] for head $HEAD_SHA or add label '$OWNER_REVIEW_LABEL'."
            return 1
          }

          # Check if configSchema changed (potential breaking for existing users)
          if echo "$CHANGED" | grep -q "openclaw.plugin.json"; then
            OWNER_GATE_REQUIRED=1
            if ! require_owner_review "Plugin manifest changed. Verify backward compatibility of configSchema."; then
              exit 1
            fi
          fi

          # Check if entry point signature changed
          if echo "$CHANGED" | grep -q "openclaw/index.ts"; then
            OWNER_GATE_REQUIRED=1
            if ! require_owner_review "Plugin entry point changed. Ensure definePluginEntry contract is preserved."; then
              exit 1
            fi
          fi

          # Check if assets were removed
          REMOVED=$(git diff --name-only --diff-filter=D origin/main...HEAD | grep "^assets/" || true)
          if [ -n "$REMOVED" ]; then
            echo "::error::Asset files removed. This may break emotion image display:"
            echo "$REMOVED"
            exit 1
          fi

          if [ "$OWNER_GATE_REQUIRED" -eq 1 ]; then
            echo "✅ Breaking-risk changes detected and owner review gate satisfied."
          else
            echo "✅ No breaking changes detected."
          fi
