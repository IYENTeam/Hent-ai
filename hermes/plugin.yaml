name: hent-ai
version: 0.3.0
description: Attach Hent-ai service-owned emotion images to Hermes Agent responses.
provides_hooks:
  - transform_llm_output
env:
  HENT_AI_SERVICE_URL: "Hent-ai service base URL, defaults to http://127.0.0.1:8787"
  HENT_AI_SERVICE_TOKEN: "Bearer token for Hent-ai service /v1 endpoints"
  HENT_AI_HERMES_CACHE_DIR: "Directory for downloaded service media files"
  HENT_AI_HERMES_SERVICE_TIMEOUT_MS: "Service request timeout in milliseconds, defaults to 5000"
  HENT_AI_ASSET_DIR: "Absolute path to emotion image directory"
  HENT_AI_DEFAULT_PROFILE: "Profile ID to use (resolves to assets/profiles/<id>/)"
  HENT_AI_HERMES_PLATFORMS: "Comma-separated platforms or * for all"
